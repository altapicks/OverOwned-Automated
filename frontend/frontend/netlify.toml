[build]
  base    = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — redundant with public/_redirects but harmless as a safety net
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers — sensible defaults
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
